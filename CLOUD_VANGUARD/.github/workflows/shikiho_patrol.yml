name: PHOENIX CLOUD PATROL (Shikiho 10Y)

on:
  schedule:
    # 毎日深夜2時 (UTC 17時) に自動巡回（自律型）
    - cron: '0 17 * * *'
  workflow_dispatch:
    # 手動実行ボタンも用意

jobs:
  patrol:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4
        # 必要に応じて追加

    - name: Run Phoenix Cloud Scraper
      run: python PHOENIX_CLOUD_SCRAPER.py

    - name: Commit and Push results
      run: |
        git config --global user.name "Phoenix Cloud Vanguard"
        git config --global user.email "phoenix-bot@antigravity.local"
        git add DATA_VAULT/
        # 変更がなければコミットしない
        git diff --empty || git commit -m "Auto-Patrol: Daily Shikiho 10Y Data Harvest"
        git pull --rebase
        git push
