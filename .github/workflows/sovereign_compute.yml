name: SOVEREIGN DISTRIBUTED COMPUTE NODE
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  run_heavy_thought:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout DNA (Repository)
        uses: actions/checkout@v4
      
      - name: Set up Python Brain
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Execute Heavy Stock Prediction (External Computation)
        run: |
          python EXTERNAL_BRAIN_NODE.py
